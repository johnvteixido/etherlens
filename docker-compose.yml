version: "3.9"

services:
  nginx:
    image: nginx:stable-alpine
    container_name: etherlens-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - etherlens-net

  api:
    build: 
      context: ./server
    container_name: etherlens-api
    restart: unless-stopped
    environment:
      - PORT=3001
      - API_KEY=${API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ./server/etherlens.db:/app/etherlens.db
      - ./server/logs:/app/logs
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/healthz" ]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - etherlens-net

  daemon:
    build:
      context: ./server
    container_name: etherlens-daemon
    restart: unless-stopped
    command: node daemon.js
    environment:
      - CONCURRENCY_LIMIT=${CONCURRENCY_LIMIT:-200}
      - SCAN_TIMEOUT_MS=${SCAN_TIMEOUT_MS:-2000}
      - API_KEY=${API_KEY}
    volumes:
      - ./server/etherlens.db:/app/etherlens.db
      - ./server/logs:/app/logs
    networks:
      - etherlens-net
    depends_on:
      api:
        condition: service_healthy

networks:
  etherlens-net:
    driver: bridge
